const LocalClock = ({timezone}) => {
  const [time,setTime] = useState("");

  const iana = tzMap[timezone];
  useEffect(()=>{
    const tick=()=>{if(!iana)return;const now=new Date();setTime(now.toLocaleTimeString("en-GB",{timeZone:iana,hour:"2-digit",minute:"2-digit",second:"2-digit"}));setDate(now.toLocaleDateString("en-GB",{timeZone:iana,weekday:"short",day:"numeric",month:"short"}));};

};

const isOpen = (timezone) => {
  const iana = tzMap[timezone];
  if (!iana) return false;
  const now = new Date();
  const day = now.toLocaleDateString("en-US", {timeZone:iana, weekday:"short"});
  const hour = parseInt(now.toLocaleTimeString("en-US", {timeZone:iana, hour:"numeric", hour12:false}));
  return day !== "Sat" && day !== "Sun" && hour >= 8 && hour < 17;
};

          {["office","contacts","tools","global"].map(t2=><button key={t2} onClick={()=>setTab(t2)} style={{padding:"7px 18px",fontSize:13,fontWeight:tab===t2?600:400,color:tab===t2?"#fff":th.textSec,background:tab===t2?th.accent:"transparent",border:"none",borderRadius:7,cursor:"pointer"}}>{t2==="global"?"VSOC Docs":t2.charAt(0).toUpperCase()+t2.slice(1)}</button>)}
        </div>
      </>}

      {tab==="office"&&selected&&<>
        <LocalClock timezone={selected.timezone}/>
        {selected.contacts.filter(c=>c.email).length>0&&(()=>{
          const to=selected.contacts.filter(c=>c.email).map(c=>c.email).join(",");
          const cc=[RICHARD,VSOC,selected.managerEmail].filter(Boolean).join(",");
          const ehsCC=[EHS,RICHARD,VSOC,selected.managerEmail].filter(Boolean).join(",");
          return <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
            <a href={"https://mail.google.com/mail/?view=cm&to="+to+"&cc="+cc+"&su="+encodeURIComponent(selected.id)} target="_blank" rel="noreferrer" style={btnBlue}>✉ Compose email</a>
            <a href={"https://mail.google.com/mail/?view=cm&to="+to+"&cc="+ehsCC+"&su="+encodeURIComponent(selected.id)} target="_blank" rel="noreferrer" style={btnBlue}>✉ Compose with EHS</a>
          </div>;
        })()}
        {(links.travel||links.elastic)&&<div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
          {links.travel&&<a href={links.travel} target="_blank" rel="noreferrer" style={btnGreen}>✈ Travel brief</a>}
          {links.elastic&&<a href={links.elastic} target="_blank" rel="noreferrer" style={btnGreen}>🔍 Elastic Search {selected.city}</a>}
        </div>}
        <div style={card}><div style={lbl}>Address</div><div style={{fontSize:14,marginBottom:12}}>{selected.address}</div><div style={{display:"flex",gap:8,flexWrap:"wrap"}}><StatusDot val={selected.accessControl} label="Access control" th={th}/><StatusDot val={selected.accessControl===true} label="CCTV" th={th}/><StatusDot val={selected.groundFloor} label="Ground floor" th={th}/></div></div>
        <PhySecManagerCard region={selected.region} th={th} dark={dark} officeId={selected.id} />
        <VSOCSpecialistCard region={selected.region} th={th} dark={dark} officeId={selected.id} />
        <SecurityCard security={selected.security} officeId={selected.id} th={th} dark={dark}/>
        {selected.notes&&<div style={{...card,background:th.amberLight,border:`1px solid ${th.amberBorder}`}}><div style={{...lbl,color:th.amber}}>Notes</div><div style={{fontSize:13,color:dark?"#FCD34D":"#92400E"}}>{selected.notes}</div></div>}
      </>}

      {tab==="contacts"&&selected&&<>
        <div style={card}>
          <div style={lbl}>Contact list</div>
          {selected.contacts.filter(c=>c.role!=="VSOC Regional Specialist").length===0&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"32px 20px",gap:8,textAlign:"center"}}><span style={{fontSize:32}}>🕐</span><div style={{fontSize:14,fontWeight:600}}>Contacts pending</div><div style={{fontSize:12,color:th.textSec,maxWidth:260}}>Contact details haven't been added yet.</div></div>}
          {selected.contacts.filter(c=>c.role!=="VSOC Regional Specialist").map((c,i,arr)=><div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:i<arr.length-1?`1px solid ${th.cardBorder}`:"none"}}>
            <div style={{width:38,height:38,borderRadius:"50%",background:"linear-gradient(135deg,#2563EB,#7C3AED)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:"#fff",flexShrink:0}}>{c.name.replace(/[^a-zA-Z ]/g,"").split(" ").filter(Boolean).map(w=>w[0]).slice(0,2).join("")}</div>
            <div style={{flex:1,minWidth:0}}><div style={{fontWeight:600,fontSize:13}}>{c.name}</div><div style={{fontSize:12,color:th.textSec}}>({c.role}){c.phone&&c.phone!=="N/A"?" · "+c.phone:""}</div>{c.note&&<div style={{fontSize:11,color:th.textTer,marginTop:2}}>{c.note}</div>}</div>
            <div style={{display:"flex",gap:6,flexShrink:0}}>
              {c.slack&&<a href={"https://slack.com/app_redirect?channel="+c.slack} target="_blank" rel="noreferrer" style={{fontSize:12,color:th.purple,textDecoration:"none",padding:"4px 10px",border:`1px solid ${th.purpleBorder}`,borderRadius:7,background:th.purpleLight,fontWeight:500}}>💬 Slack</a>}
              {c.email&&<a href={"https://mail.google.com/mail/?view=cm&to="+c.email+"&cc="+[RICHARD,selected.managerEmail,VSOC].filter(Boolean).join(",")+"&su="+encodeURIComponent(selected.id)} target="_blank" rel="noreferrer" style={{fontSize:12,color:th.accent,textDecoration:"none",padding:"4px 10px",border:`1px solid ${th.accentBorder}`,borderRadius:7,background:th.accentLight,fontWeight:500}}>✉ Email</a>}
            </div>
          </div>)}
        </div>
        <div style={{...card,border:`1px solid ${th.accentBorder}`,background:th.accentLight}}>
          <div style={{...lbl,color:th.accent}}>VSOC 24/7 Support</div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:16}}>📞</span>
                <div>
                  <div style={{fontSize:13,fontWeight:600,color:dark?"#F1F5F9":th.text}}>Phone / Text</div>
                  <div style={{fontSize:12,color:th.textSec}}>+1-415-723-6704</div>
                </div>
              </div>
              <a href="tel:+14157236704" style={{fontSize:12,color:th.accent,textDecoration:"none",padding:"4px 10px",border:`1px solid ${th.accentBorder}`,borderRadius:7,background:dark?"rgba(37,99,235,0.2)":"#fff",fontWeight:500}}>Call</a>
            </div>
            <div style={{borderTop:`1px solid ${th.cardBorder}`,paddingTop:10,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:16}}>✉️</span>
                <div>
                  <div style={{fontSize:13,fontWeight:600,color:dark?"#F1F5F9":th.text}}>Email</div>
                  <div style={{fontSize:12,color:th.textSec}}>vsoc@unity3d.com</div>
                </div>
              </div>
              <a href="https://mail.google.com/mail/?view=cm&to=vsoc@unity3d.com&su=VSOC+Support+Request" target="_blank" rel="noreferrer" style={{fontSize:12,color:th.accent,textDecoration:"none",padding:"4px 10px",border:`1px solid ${th.accentBorder}`,borderRadius:7,background:dark?"rgba(37,99,235,0.2)":"#fff",fontWeight:500}}>✉ Email</a>
            </div>
            <div style={{borderTop:`1px solid ${th.cardBorder}`,paddingTop:10,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:16}}>💬</span>
                <div>
                  <div style={{fontSize:13,fontWeight:600,color:dark?"#F1F5F9":th.text}}>Slack</div>
                  <div style={{fontSize:12,color:th.textSec}}>#vsoc-support</div>
                </div>
              </div>
              <a href="https://unity.enterprise.slack.com/archives/CR7BQ7BU1" target="_blank" rel="noreferrer" style={{fontSize:12,color:th.purple,textDecoration:"none",padding:"4px 10px",border:`1px solid ${th.purpleBorder}`,borderRadius:7,background:dark?"rgba(124,58,237,0.2)":th.purpleLight,fontWeight:500}}>💬 Slack</a>
            </div>
          </div>
        </div>
        <div style={{...card,border:"1px solid #FED7AA",background:dark?"#431407":"#FFF7ED"}}>
          <div style={{...lbl,color:dark?"#F1F5F9":"#C2410C"}}>Critical Emergency PhySec Notification Order</div>
          {notifOrder.map((n,i)=><div key={i} style={{padding:"10px 0",borderBottom:i<notifOrder.length-1?"1px solid #FED7AA":"none"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}><Badge label={n.order} color={th.accent} bg={th.accentLight}/><span style={{fontWeight:600,fontSize:13,color:dark?"#F1F5F9":th.text}}>{n.name}</span></div>
              {n.email&&<div style={{display:"flex",gap:6}}>
                <a href={"https://slack.com/app_redirect?channel="+n.slackId} target="_blank" rel="noreferrer" style={{fontSize:12,color:th.purple,textDecoration:"none",padding:"3px 8px",border:`1px solid ${th.purpleBorder}`,borderRadius:6,background:th.purpleLight,fontWeight:500}}>💬 Slack</a>
                <a href={"https://mail.google.com/mail/?view=cm&to="+n.email+"&su="+encodeURIComponent("URGENT: ")} target="_blank" rel="noreferrer" style={{fontSize:12,color:th.accent,textDecoration:"none",padding:"3px 8px",border:`1px solid ${th.accentBorder}`,borderRadius:6,background:th.accentLight,fontWeight:500}}>✉ Email</a>
              </div>}
            </div>
            {n.email&&<div style={{fontSize:12,color:dark?"#F1F5F9":"#9A3412",marginBottom:2}}>{n.email} · {n.mobile}</div>}
            <div style={{fontSize:12,color:dark?"#FCD34D":"#C2410C"}}>{n.note}</div>
          </div>)}
        </div>
      </>}

      {tab==="tools"&&selected&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
        <ToolBtn href={jiraUrl(selected.city)} label="Jira" subtitle={`View tickets for ${selected.city}`} icon="🎯" accent={th.accent} lightBg={th.accentLight}/>
        <ToolBtn href={selected.tools.confluence} label="Confluence" subtitle={`${selected.city} office wiki`} icon="📘" accent={th.green} lightBg={th.greenLight}/>
        <ToolBtn href={selected.tools.gable} label="Gable" subtitle={`${selected.city} floor plan & booking`} icon="🏢" accent="#D97706" lightBg={th.amberLight}/>
        <ToolBtn href={HELPDESK} label="Help Desk" subtitle="Unity support portal" icon="🎧" accent={th.purple} lightBg={th.purpleLight}/>
        <ToolBtn href="https://portal.max-security.com/login" label="Max Security" subtitle="Max Security portal" icon="🛡️" accent={th.red} lightBg={th.redLight}/>
        <ToolBtn href="https://app.dataminr.com/app/dashboard/feeds?pulseweb=true" label="Dataminr" subtitle="Dataminr pulse dashboard" icon="📡" accent="#0EA5E9" lightBg="#F0F9FF"/>
      </div>}

      {tab==="global"&&<div style={card}>
        <div style={lbl}>VSOC Docs</div>
        {globalDocs.map((d,i)=><div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 0",borderBottom:i<globalDocs.length-1?`1px solid ${th.cardBorder}`:"none"}}>
          <span style={{fontSize:13,fontWeight:500}}>{d.name}</span>
          <a href={d.url} target="_blank" rel="noreferrer" style={{fontSize:12,color:th.accent,textDecoration:"none",padding:"4px 12px",border:`1px solid ${th.accentBorder}`,borderRadius:7,background:th.accentLight,whiteSpace:"nowrap",marginLeft:12,fontWeight:500}}>Open ↗</a>
        </div>)}
      </div>}
    </div>
  </div>;
}

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
